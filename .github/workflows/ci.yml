name: ci

on:
  workflow_dispatch:      # Start a workflow
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Remove ~18 GiB of preinstalled software to have more disk space during the build
    - name: Cleanup runner
      run: |
        df -h
        sudo rm -rf /opt/microsoft /usr/local/.ghcup /usr/local/julia* /usr/share/dotnet /usr/share/swift /usr/lib/llvm*
        df -h

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build
      uses: docker/build-push-action@v6
      with:
        context: .
        tags: retro-go:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true

    - name: Create build directory
      run: mkdir -p build

    - name: Extract binaries from docker image
      run: |
        # Check which folders/files are in the image
        docker run --rm retro-go:latest find /app -name "*.bin" -o -name "*.fw" 2>/dev/null || true
        
        # Copy .bin files if they exist
        docker run --rm -v $(pwd)/build:/out retro-go:latest sh -c "if [ -d /app/build ]; then cp /app/build/*.bin /out/ 2>/dev/null || true; fi" || true
        
        # Copy .fw files if they exist
        docker run --rm -v $(pwd)/build:/out retro-go:latest sh -c "if [ -f /app/*.fw ]; then cp /app/*.fw /out/ 2>/dev/null || true; fi" || true
        
        # Check what has been copied
        ls -la build/ || echo "No files extracted"

    - name: Debug - Show extracted files
      if: always()
      run: |
        echo "Contents of build directory:"
        ls -lah build/ || echo "Build directory is empty or doesn't exist"
        echo ""
        echo "Files in docker image (for debugging):"
        docker run --rm retro-go:latest find /app -type f \( -name "*.bin" -o -name "*.fw" -o -name "*.elf" \) 2>/dev/null || true

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: build/
        if-no-files-found: warn
